/* GOOGLE REVIEWS */

.review-card{

.stars{color:#fbbf24;font-size:18px;margin-bottom:10px;}
.review-card span{display:block;margin-top:15px;font-weight:bold;color:#444;}

/* FAQ */
.faq{padding:80px 20px;background:#0f172a;}
.faq-item{max-width:700px;margin:15px auto;border-radius:10px;overflow:hidden;}
.faq-question{
width:100%;padding:18px;border:none;background:#1f2937;color:white;
text-align:left;font-size:16px;cursor:pointer;
display:flex;justify-content:space-between;align-items:center;}
.faq-answer{
max-height:0;overflow:hidden;background:#111827;
transition:max-height 0.4s ease;padding:0 18px;text-align:left;}
.faq-answer p{padding:15px 0;}
.icon{font-size:20px;font-weight:bold;}

/* WhatsApp */

width:60px;height:60px;display:flex;

@keyframes logoFloat{0%{transform:translateY(0);}50%{transform:translateY(-10px);}100%{transform:translateY(0);}}
@keyframes auraPulse{0%{opacity:0.6; transform:translate(-50%,-50%) scale(1);}
50%{opacity:1; transform:translate(-50%,-50%) scale(1.1);}
100%{opacity:0.6; transform:translate(-50%,-50%) scale(1);}}
