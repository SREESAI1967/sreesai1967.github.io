<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saideva Meditation</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
overflow:hidden;
color:white;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* STAR BACKGROUND */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* GLASS CARD */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
padding:40px;
width:90%;
max-width:600px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
animation:fadeIn 1.5s ease;
}

h1{
font-size:38px;
margin-bottom:15px;
font-weight:700;
background:linear-gradient(90deg,#00f5ff,#00ffae);
-webkit-background-clip:text;
color:transparent;
}

p{
font-size:18px;
margin-bottom:25px;
opacity:0.9;
}

button{
padding:12px 30px;
border:none;
border-radius:30px;
font-size:16px;
font-weight:600;
cursor:pointer;
background:linear-gradient(90deg,#00f5ff,#00ffae);
color:black;
transition:0.4s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #00ffae;
}

/* ANIMATION */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="card">
<h1>🧘 Sai Deva Meditation</h1>
<p>ఆర్థిక స్వేచ్ఛ • ఆధ్యాత్మిక శక్తి • మనశ్శాంతి</p>
<button onclick="alert('Welcome to Sai Deva Meditation!')">Join Now</button>
</div>

<script>
// STAR PARTICLES
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
radius:Math.random()*1.5,
speed:Math.random()*0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

stars.forEach(star=>{
ctx.beginPath();
ctx.arc(star.x,star.y,star.radius,0,Math.PI*2);
ctx.fill();

star.y+=star.speed;
if(star.y>canvas.height){
star.y=0;
star.x=Math.random()*canvas.width;
}
});
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
