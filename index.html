<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sai Deva Meditation</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Noto Sans Telugu', sans-serif;
}

body{
background:linear-gradient(135deg,#0f0f1a,#111827,#1a1a2e);
color:white;
text-align:center;
}

/* HERO */
.hero{
padding:100px 20px 40px;
}

.logo-wrapper{
position:relative;
display:inline-block;
}

.logo-wrapper::before{
content:"";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:280px;
height:280px;
background:radial-gradient(circle, rgba(0,245,160,0.4) 0%, rgba(0,217,245,0.3) 40%, transparent 70%);
border-radius:50%;
z-index:0;
animation:auraPulse 4s ease-in-out infinite;
}

.logo{
width:200px;
position:relative;
z-index:1;
animation:logoFloat 3s ease-in-out infinite;
}

/* CONTENT SECTION */
.content-section{
display:flex;
align-items:center;
justify-content:space-between;
gap:30px;
padding:60px 20px;
max-width:1200px;
margin:auto;
flex-wrap:wrap;
}

.content-section img{
width:300px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transition:0.4s;
}

.content-section img:hover{
transform:scale(1.05);
box-shadow:0 15px 40px rgba(251,191,36,0.8);
}

.center-text{
flex:1;
min-width:280px;
font-size:18px;
line-height:1.7;
}

/* FULL WIDTH POWER BANNER */
.power-banner{
width:100%;
background:linear-gradient(90deg,#fbbf24,#f97316);
color:#0f172a;
padding:45px 20px;
font-size:44px;   /* Doubled Size */
font-weight:700;
font-family:'Cinzel', serif;
letter-spacing:1px;
margin-top:60px;
line-height:1.4;
}

.power-banner .english{
display:block;
font-size:26px;
margin-top:15px;
font-family:'Noto Sans Telugu', sans-serif;
}

/* CTA BUTTON */
.cta-section{
margin:50px 0 120px;
}

.button{
background:linear-gradient(45deg,#fbbf24,#f97316);
color:#0f172a;
padding:18px 55px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
display:inline-block;
transition:0.3s ease;
box-shadow:0 0 20px rgba(251,191,36,0.5);
font-size:18px;
}

.button:hover{
transform:scale(1.08);
box-shadow:0 0 30px rgba(251,191,36,0.9);
}

/* MOBILE */
@media(max-width:900px){
.content-section{
flex-direction:column;
}

.content-section img{
width:90%;
}

.logo{
width:150px;
}

.logo-wrapper::before{
width:200px;
height:200px;
}

.power-banner{
font-size:28px;
padding:30px 15px;
}

.power-banner .english{
font-size:18px;
}
}

/* ANIMATIONS */
@keyframes logoFloat{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

@keyframes auraPulse{
0%{opacity:0.6; transform:translate(-50%,-50%) scale(1);}
50%{opacity:1; transform:translate(-50%,-50%) scale(1.1);}
100%{opacity:0.6; transform:translate(-50%,-50%) scale(1);}
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="hero">
    <div class="logo-wrapper">
        <img src="./logo.png" alt="Sai Deva Meditation Logo" class="logo">
    </div>
</div>

<!-- COW | TEXT | LION -->
<div class="content-section">

    <img src="./cow.png" alt="Meditation Cow">

    <div class="center-text">
        🐄 <strong>గోవు శాంతి & పోషక శక్తికి ప్రతీక</strong><br>
        Cow represents peace & nurturing energy.<br><br>

        🦁 <strong>సింహం శక్తి & అంతరంగ బలానికి ప్రతీక</strong><br>
        Lion represents power & inner strength.
    </div>

    <img src="./lion.png" alt="Meditation Lion">

</div>

<!-- POWER BANNER -->
<div class="power-banner">
    శాంతి శక్తిని స్వీకరించండి. అంతరంగ బలాన్ని మేల్కొలపండి.
    <span class="english">
    Balance peace within, awaken the power inside you.
    </span>
</div>

<!-- CTA -->
<div class="cta-section">
    <a href="YOUR_RAZORPAY_LINK_HERE" class="button" target="_blank">
        ఇప్పుడే చేరండి
    </a>
</div>

</body>
</html>
